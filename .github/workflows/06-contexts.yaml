name: 06 - Contexts
on: 
  workflow_dispatch: 

jobs:
  echo-data:
    runs-on: ubuntu-latest
    steps:
      - name: Display Information
        run: |
          echo "Event Name ${{github.event_name}}
          echo "Ref ${{github.ref}}
          echo "Ref ${{github.sha}}
          echo "Ref ${{github.actor}}
          echo "Ref ${{github.workflow}}
          echo "Ref ${{github.run_id}}
          echo "Ref ${{github.run_number}}
      - name: Retrieve Variable
        run: |
          echo "Event Name ${{vars.MY_VAR}}
