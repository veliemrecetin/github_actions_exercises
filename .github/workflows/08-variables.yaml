name: 08 - Using Variables

env:
  WORKFLOW_VAR: I am a workflow env var
  OVERWRITTEN: I will be overwritten
  
on:
  workflow_dispatch:
    
jobs:
  echo:
    runs-on: ubuntu-latest
    env:
      JOB_VAR: I am a job env var
      OVERWRITTEN: I will be overwritten at job level
    steps:
      - name: Print Env Variables
        env:
          STEP_VAR: I am a step env var
          step_var2: I am another step var
        run: |
          echo "Step env var: ${{ env.STEP_VAR }}"
          echo "Step var2: ${{ env.step_var2 }}"
          echo "Job env var: ${{ env.JOB_VAR }}"
          echo "Workflow env var: ${{ env.WORKFLOW_VAR }}"
          echo "Overwritten: ${{ env.OVERWRITTEN }}"
      - name: Overrwrite Job Variables
        env:
          OVERWRITTEN: I have been overwritten at step level
        run: |
          echo "Step env var overwritten: ${{ env.WORKFLOW_VAR }}"
  echo2:
    runs-on: ubuntu-latest
    steps:
      - name: Print Vars
        run: |
          echo "Org var: ${{ vars.ORG_VAR }}"
          echo "Org overwritten var: ${{ vars.OVERWRITTEN_VAR }}"
          echo "Repo var: ${{ vars.REPOSITORY_VAR }}"
  echo-prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Print Prod Vars
        run: |
          echo "Org var: ${{ vars.ORG_VAR }}"
          echo "Org overwritten var: ${{ vars.OVERWRITTEN_VAR }}"
          echo "Repo var: ${{ vars.REPOSITORY_VAR }}"
          echo "Env var: ${{ vars.TARGET_VAR }}"
  echo-undefined:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Print Undefined Var
        run: |
          echo "Org var: ${{ vars.UNDEFINED_VAR || 'value is undefined' }}"
        
        

      
    
    
  
